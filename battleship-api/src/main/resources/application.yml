spring:
  datasource:
    url: jdbc:h2:file:./data/battleship;AUTO_SERVER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  h2:
    console:
      enabled: true
      path: /h2-console
  flyway:
    enabled: false

jwt:
  secret: ${JWT_SECRET:super-secret-key-for-development-only-change-in-prod}
  expiration-ms: 86400000

server:
  port: ${PORT:8080}
